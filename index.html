<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHouse | Sua Casa Inteligente</title>

    <style>
        body {
            background-image: url('banner2.jpg'); /* melhor sem espaço no nome */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .faixa-azul {
            background-color: #1a237e;
            color: white;
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #b71c1c;
        }

        nav {
            background-color: #283593;
            text-align: center;
            padding: 10px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        nav a:hover {
            color: #ff5252;
        }

        main {
            background-color: rgba(255, 255, 255, 0.95);
            width: 80%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .banner-principal {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            margin: 20px 0;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        video {
            width: 100%;
            height: auto;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            background-color: rgba(0,0,0,0.7);
        }

        /* 🔥 RESPONSIVO PARA CELULAR */
        @media (max-width: 480px) {

            main {
                width: 95%;
                padding: 15px;
                margin: 20px auto;
            }

            .faixa-azul h1 {
                font-size: 22px;
            }

            .faixa-azul p {
                font-size: 14px;
            }

            nav a {
                display: block;
                margin: 10px 0;
                padding: 5px 0;
                border-bottom: 1px solid rgba(255,255,255,0.2);
            }
        }
    </style>
</head>

<body>

<header>
    <div class="faixa-azul">
        <h1>SMARTHOUSE</h1>
        <p>A SUA CASA INTELIGENTE!</p>
    </div>

    <nav>
        <a href="index.html">Página Inicial</a>
        <a href="produtos.html">Ver Produtos</a>
        <a href="contato.html">Fale Conosco</a>
    </nav>
</header>

<main>
    <p>Ofertas de Hoje!</p>

    <img src="banner2.jpg" alt="Banner Smarthouse" class="banner-principal">

    <section>
        <h2>Explore nossa página:</h2>
        <p>Sua casa merece a melhor tecnologia do mercado.</p>
    </section>

    <section>
        <h3>Veja como funciona:</h3>
        <video controls>
            <source src="video-produtos.mp4" type="video/mp4">
        </video>
    </section>
</main>

<footer>
    <p>&copy; 2026 SmartHouse - Todos os direitos reservados</p>
</footer>

</body>
</html>
